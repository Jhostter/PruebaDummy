trigger:
- main

pool:
  name: 'Default'

variables:
  dockerRegistryServiceConnection: 'dockerhub-conn'
  imageRepository: 'jhostterv/pruebadummy'
  containerRegistry: 'docker.io'
  dockerfilePath: '$(Build.SourcesDirectory)/backend/Dockerfile'
  tag: '$(Build.BuildId)'

stages:
- stage: Quality_and_Scripts
  jobs:
  - job: ParallelMessages
    strategy:
      parallel: 10
    steps:
    - script: echo "Escribiendo desde la instancia $(System.JobPositionInPhase)"
      displayName: 'Punto A: Mensaje Paralelo'

  - job: FileCreation
    steps:
    - bash: |
        echo "Iniciando creación de archivos..."
        for i in {1..10}
        do
          FECHA=$(date +"%Y-%m-%d_%H-%M-%S")
          NOMBRE="archivo_${i}_${FECHA}.txt"
          touch $NOMBRE
          echo "Creado: $NOMBRE"
        done
        echo "Lista de archivos creados:"
        ls -ltr archivo_*.txt
      displayName: 'Punto B: Script archivos con fecha'

  - job: SonarAnalysis
    steps:
    - task: SonarQubePrepare@8
      name: SonarPrepare
      inputs:
        SonarQube: 'sonarqube-local'
        scannerMode: 'CLI'
        configMode: 'manual'
        cliProjectKey: 'dummy_devops'
        cliSources: 'backend'
        extraProperties: |
          sonar.scm.provider=none
          sonar.branch.name=

    - bash: |
        echo "Buscando el BINARIO del escáner..."
        # Buscamos el archivo ejecutable dentro de la carpeta bin
        SCANNER_PATH=$(find $(Agent.WorkFolder)/_tasks -path "*/bin/sonar-scanner" -type f | head -n 1)
        
        if [ -z "$SCANNER_PATH" ]; then
          echo "[error]No se encontró el ejecutable. Revisa si la tarea SonarQubePrepare se ejecutó bien."
          exit 1
        fi
        
        echo "Binario encontrado en: $SCANNER_PATH"
        
        chmod +x $SCANNER_PATH
        
        $SCANNER_PATH \
          -Dsonar.projectKey=dummy_devops \
          -Dsonar.sources=backend \
          -Dsonar.host.url=http://192.168.107.20:9000 \
          -Dsonar.login=$TOKEN_DE_SONAR \
          -Dsonar.scm.disabled=true \
          -Dsonar.branch.name=
      displayName: 'Bypass de Análisis SonarQube'
      env:
        TOKEN_DE_SONAR: $(SONAR_TOKEN)

    - task: SonarQubePublish@8
      displayName: 'Verificar Calidad de SonarQube'
      inputs:
        checkLogForIssues: true
        pollingTimeoutSec: '300'

    - bash: |
        echo "Consultando estado del Quality Gate..."

        sleep 10

        URL="http://192.168.107.20:9000/api/qualitygates/project_status?projectKey=dummy_devops"
        RESPONSE=$(curl -s -u "$TOKEN_DE_SONAR:" "$URL")
        
        echo "Respuesta recibida: $RESPONSE"

        STATUS=$(echo $RESPONSE | grep -o '"status":"[^"]*"' | head -1 | cut -d'"' -f4)
        
        echo "Estado final: $STATUS"
        
        if [ "$STATUS" == "ERROR" ]; then
          echo "[error]🔴 QUALITY GATE FAILED: Cobertura insuficiente (0.0%)."
          exit 1
        elif [ "$STATUS" == "OK" ]; then
          echo "[section]🟢 QUALITY GATE PASSED: Todo en orden."
        else
          echo "[warning]⚠️ Estado desconocido: $STATUS"
        fi
      displayName: 'Verificación Forzada de Quality Gate'
      env:
        TOKEN_DE_SONAR: $(SONAR_TOKEN)
        
- stage: Build_and_Push
  dependsOn: Quality_and_Scripts
  condition: succeeded()
  jobs:
  - job: Build
    steps:
    - task: Docker@2
      displayName: 'Generar y subir imagen a DockerHub'
      inputs:
        command: 'buildAndPush'
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
          latest